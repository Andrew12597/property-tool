name: Import NSW Weekly Sales Data

on:
  # Runs every Tuesday at 9am Sydney time (AEST = UTC+10, so Monday 11pm UTC)
  schedule:
    - cron: '0 23 * * 1'

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import latest weekly data
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/import-weekly.mjs --skip-geocoding
